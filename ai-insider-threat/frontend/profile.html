<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - AI Insider Threat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--panel-bg);
            border: var(--glass-border);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
        }

        .profile-sidebar {
            width: 250px;
            background: rgba(0, 0, 0, 0.2);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: var(--glass-border);
        }

        .profile-main {
            flex-grow: 1;
            padding: 40px;
        }

        .profile-avatar-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid rgba(59, 130, 246, 0.3);
            margin-bottom: 20px;
            object-fit: cover;
        }

        .profile-role {
            font-size: 13px;
            color: var(--accent-color);
            background: rgba(59, 130, 246, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            margin-top: 10px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-row {
            display: flex;
            gap: 20px;
        }
        
        .form-row .form-group {
            flex: 1;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .form-group input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .save-bar {
            margin-top: 40px;
            display: flex;
            justify-content: flex-end;
            padding-top: 24px;
            border-top: var(--glass-border);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-shield-halved"></i>
                <h2>Simran<span class="highlight">AI</span></h2>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="upload.html" class="nav-item"><i class="fa-solid fa-file-csv"></i> Upload Data</a>
                <a href="threat_intel.html" class="nav-item"><i class="fa-solid fa-user-secret"></i> Threat Intel</a>
                <a href="relationships.html" class="nav-item"><i class="fa-solid fa-network-wired"></i> Relationships</a>
                <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
            </nav>
            <div class="controls">
                <button class="btn-primary" onclick="window.location.href='index.html'">
                    <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <button class="hamburger" id="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('active')">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="header-titles">
                    <h1>My Profile</h1>
                    <p>Manage your account details and security permissions</p>
                </div>
                <div class="user-profile">
                    <a href="profile.html">
                        <img src="https://ui-avatars.com/api/?name=Admin+User&background=0D8ABC&color=fff" alt="Admin" class="avatar" id="header-avatar">
                    </a>
                </div>
            </header>

            <section class="profile-container">
                <div class="profile-sidebar">
                    <img src="https://ui-avatars.com/api/?name=Admin+User&background=0D8ABC&color=fff" alt="Profile" class="profile-avatar-large" id="main-avatar">
                    <h3 style="margin-bottom: 4px;" id="side-name">Admin User</h3>
                    <div style="color: var(--text-secondary); font-size: 13px;" id="side-email">admin@company.com</div>
                    <div class="profile-role">Super Administrator</div>
                </div>

                <div class="profile-main">
                    <h2 style="margin-bottom: 24px; font-size: 18px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px;">Personal Information</h2>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="input-name" value="Admin User">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="input-email" value="admin@company.com">
                    </div>

                    <h2 style="margin-top: 40px; margin-bottom: 24px; font-size: 18px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px;">Security</h2>

                    <div class="form-group">
                        <label>Current Password</label>
                        <input type="password" placeholder="••••••••">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>New Password</label>
                            <input type="password" placeholder="Enter new password">
                        </div>
                        <div class="form-group">
                            <label>Confirm Password</label>
                            <input type="password" placeholder="Confirm new password">
                        </div>
                    </div>

                    <div class="save-bar">
                        <button class="btn-primary" style="width: auto; padding: 12px 32px;" onclick="saveProfile(this)">
                            <i class="fa-solid fa-floppy-disk"></i> Save Changes
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Use localStorage to make the UI persist locally across pages
        document.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('userName') || 'Admin User';
            const savedEmail = localStorage.getItem('userEmail') || 'admin@company.com';
            
            // Update UI elements to match saved state
            document.getElementById('input-name').value = savedName;
            document.getElementById('input-email').value = savedEmail;
            
            updateDisplay(savedName, savedEmail);
        });

        function updateDisplay(name, email) {
            document.getElementById('side-name').innerText = name;
            document.getElementById('side-email').innerText = email;
            
            const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=0D8ABC&color=fff`;
            document.getElementById('main-avatar').src = avatarUrl;
            document.getElementById('header-avatar').src = avatarUrl;
            
            // Re-update avatars on all pages if possible, but they will fetch on their own load
        }

        function saveProfile(btn) {
            const newName = document.getElementById('input-name').value;
            const newEmail = document.getElementById('input-email').value;
            
            localStorage.setItem('userName', newName);
            localStorage.setItem('userEmail', newEmail);
            
            updateDisplay(newName, newEmail);

            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-check"></i> Details Saved!';
            btn.style.background = 'var(--success)';
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = 'var(--accent-color)';
            }, 2000);
        }
    </script>
</body>
</html>
